          - generic [ref=e61]: Are there any courses that explain what RAG is?
          - generic [ref=e62]:
            - generic [ref=e63]:
              - paragraph [ref=e64]:
                - text: Yes! There are at least
                - strong [ref=e65]: two courses
                - text: "that explain what RAG (Retrieval Augmented Generation) is:"
              - separator [ref=e66]
              - heading "1. 📘 Prompt Compression and Query Optimization" [level=3] [ref=e67]
              - list [ref=e68]:
                - listitem [ref=e69]:
                  - strong [ref=e70]: Lesson 1
                  - text: "provides a thorough introduction to RAG, covering:"
                  - list [ref=e71]:
                    - listitem [ref=e72]:
                      - strong [ref=e73]: Definition
                      - text: ": RAG is a system design pattern that uses information retrieval techniques (including vector search) combined with foundation models to provide accurate, relevant responses to user queries."
                    - listitem [ref=e74]:
                      - strong [ref=e75]: How it works
                      - text: ": It retrieves semantically similar data to supplement user queries with additional context, then feeds that combined input into an LLM."
                    - listitem [ref=e76]:
                      - strong [ref=e77]: Key benefits
                      - text: ":"
                      - list [ref=e78]:
                        - listitem [ref=e79]: Grounds LLM responses in relevant, up-to-date information (reducing hallucinations)
                        - listitem [ref=e80]: Reduces the amount of data passed into the context window
                        - listitem [ref=e81]: Removes the need for fine-tuning in some scenarios
                        - listitem [ref=e82]: Enables use of private or domain-specific data
              - separator [ref=e83]
              - heading "2. 📗 Advanced Retrieval for AI with Chroma" [level=3] [ref=e84]
              - list [ref=e85]:
                - listitem [ref=e86]:
                  - strong [ref=e87]: Lesson 1
                  - text: reviews the elements of an
                  - strong [ref=e88]: embeddings-based retrieval system
                  - text: "and how it fits into a RAG loop with an LLM. It covers:"
                  - list [ref=e89]:
                    - listitem [ref=e90]: The overall system diagram of how RAG works in practice
                    - listitem [ref=e91]: How user queries are embedded and matched against stored document embeddings
                    - listitem [ref=e92]:
                      - text: Common
                      - strong [ref=e93]: pitfalls and failure modes
                      - text: of retrieval in a RAG system
              - separator [ref=e94]
              - paragraph [ref=e95]:
                - text: Both courses are great starting points —
                - strong [ref=e96]: Prompt Compression and Query Optimization
                - text: is ideal if you want a conceptual foundation, while
                - strong [ref=e97]: Advanced Retrieval for AI with Chroma
                - text: is better if you want to dive into the technical mechanics and challenges of RAG systems. Would you like the full outline of either course?
